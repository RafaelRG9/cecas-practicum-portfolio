spring.application.name=cecas-api

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info

app.upload-dir=${UPLOAD_DIR:/app/uploads}

# Server-side session cookie (60 minute idle timeout)
server.servlet.session.timeout=60m
server.servlet.session.cookie.name=CECASSESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}

